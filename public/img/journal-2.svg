<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0.179" y2="0.883">
      <stop offset="0" stop-color="#1A1816"/>
      <stop offset="1" stop-color="#3C3733"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.55" r="0.8">
      <stop offset="0" stop-color="#967C4F" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#967C4F" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#967C4F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#g)"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>
  
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" style="mix-blend-mode:overlay"/>
